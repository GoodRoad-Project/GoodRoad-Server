services:
  db:
    image: postgis/postgis:16-3.4
    container_name: goodroad_db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
    volumes:
      - goodroad_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 5s
      retries: 5
      timeout: 3s

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: goodroad_server
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      ADMIN_PHONE: ${ADMIN_PHONE}
      ADMIN_PASS: ${ADMIN_PASS}
    depends_on:
      - db
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  goodroad_db: